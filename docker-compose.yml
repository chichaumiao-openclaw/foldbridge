services:
  foldbridge-web:
    build:
      context: .
    image: foldbridge-site:dev
    ports:
      - "${FOLDBRIDGE_PORT:-8081}:8080"
    environment:
      NODE_ENV: development
      FOLDBRIDGE_ANNO_ROOT: /annojoin-data
    volumes:
      - "${FOLDBRIDGE_ANNO_ROOT:-/Users/joseperezmartinez/docs/rmdb2pdb/task_packages/confidence_v3_restart_20260613/remote_root}:/annojoin-data:ro"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/dist/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
